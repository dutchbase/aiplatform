name: Secrets Scanner

on:
  pull_request:
    branches: [ master, main, develop ]
  push:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  scan-secrets:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scan
      
      - name: Verify patterns file exists
        run: |
          if [ ! -f ".secrets-patterns" ]; then
            echo "❌ Error: .secrets-patterns file not found"
            exit 1
          fi
          echo "✅ Patterns file found"
      
      - name: Scan changed files in PR
        if: github.event_name == 'pull_request'
        run: |
          set +e  # Don't exit on first error
          
          echo "🔍 Scanning files changed in this PR..."
          
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "ℹ️  No files changed"
            exit 0
          fi
          
          SECRETS_FOUND=0
          
          # Files to exclude
          EXCLUDE_PATTERN='(\.example$|\.sample$|\.template$|test|fixture|mock|\.md$)'
          
          while IFS= read -r file; do
            # Skip if file doesn't exist or is excluded
            if [ ! -f "$file" ] || echo "$file" | grep -qE "$EXCLUDE_PATTERN"; then
              continue
            fi
            
            echo "📄 Scanning: $file"
            
            # Scan against patterns
            while IFS= read -r pattern; do
              [[ -z "$pattern" || "$pattern" =~ ^# ]] && continue
              
              if grep -qiE "$pattern" "$file"; then
                MATCHES=$(grep -niE "$pattern" "$file")
                
                # Filter out obvious fakes
                REAL_MATCHES=$(echo "$MATCHES" | grep -viE '(your|my|example|test|fake|dummy|placeholder|xxx|changeme|replace|todo|fixme|\*\*\*|\.\.\.)')
                
                if [ -n "$REAL_MATCHES" ]; then
                  echo "🚨 POTENTIAL SECRET in $file"
                  echo "Pattern: $pattern"
                  echo "$REAL_MATCHES" | head -3
                  echo ""
                  SECRETS_FOUND=$((SECRETS_FOUND + 1))
                fi
              fi
            done < ".secrets-patterns"
          done <<< "$CHANGED_FILES"
          
          if [ $SECRETS_FOUND -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ CI CHECK FAILED: $SECRETS_FOUND potential secret(s) detected"
            echo ""
            echo "🔒 Action required:"
            echo "   1. Remove secrets from committed files"
            echo "   2. Use environment variables instead"
            echo "   3. Move secrets to .env (gitignored)"
            exit 1
          else
            echo "✅ No secrets detected"
            exit 0
          fi
      
      - name: Scan all files on push
        if: github.event_name == 'push'
        run: |
          set +e
          
          echo "🔍 Scanning all tracked files..."
          
          TRACKED_FILES=$(git ls-files)
          SECRETS_FOUND=0
          EXCLUDE_PATTERN='(\.example$|\.sample$|\.template$|test|fixture|mock|\.md$|\.secrets-patterns$)'
          
          while IFS= read -r file; do
            if [ ! -f "$file" ] || echo "$file" | grep -qE "$EXCLUDE_PATTERN"; then
              continue
            fi
            
            while IFS= read -r pattern; do
              [[ -z "$pattern" || "$pattern" =~ ^# ]] && continue
              
              if grep -qiE "$pattern" "$file"; then
                MATCHES=$(grep -niE "$pattern" "$file")
                REAL_MATCHES=$(echo "$MATCHES" | grep -viE '(your|my|example|test|fake|dummy|placeholder|xxx|changeme|replace|todo|fixme|\*\*\*|\.\.\.)')
                
                if [ -n "$REAL_MATCHES" ]; then
                  echo "🚨 SECRET in $file"
                  echo "Pattern: $pattern"
                  echo "$REAL_MATCHES" | head -3
                  echo ""
                  SECRETS_FOUND=$((SECRETS_FOUND + 1))
                fi
              fi
            done < ".secrets-patterns"
          done <<< "$TRACKED_FILES"
          
          if [ $SECRETS_FOUND -gt 0 ]; then
            echo "❌ Push blocked: secrets detected"
            exit 1
          else
            echo "✅ All files clean"
            exit 0
          fi
      
      - name: Install gitleaks (comprehensive scanner)
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
      
      - name: Run gitleaks scan
        run: |
          echo "🔍 Running gitleaks (deep history scan)..."
          gitleaks detect --verbose --no-git || {
            echo "⚠️  Gitleaks found potential secrets"
            echo "Review the output above"
            exit 1
          }
          echo "✅ Gitleaks scan passed"
